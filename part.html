<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Contests | Profi-Bharat</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root { --bg: #080810; --accent: #d946ef; --purple: #a855f7; --gradient: linear-gradient(135deg, #d946ef 0%, #a855f7 100%); }
        body { background-color: var(--bg); color: white; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow-x: hidden; }
        .hero-section { padding: 80px 20px 40px; text-align: center; }
        .hero-title { font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 800; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .contest-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .contest-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(168, 85, 247, 0.2); border-radius: 30px; padding: 40px 20px; text-align: center; position: relative; transition: 0.3s; backdrop-filter: blur(10px); }
        .live-tag { position: absolute; top: 20px; right: 20px; border: 1px solid var(--purple); padding: 4px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: 800; background: rgba(0,0,0,0.5); }
        .icon-box { width: 70px; height: 70px; background: var(--gradient); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 0 auto 20px; }
        .btn-join { background: var(--gradient); color: white; border: none; padding: 15px 30px; border-radius: 100px; font-weight: 800; cursor: pointer; width: 100%; transition: 0.3s; text-transform: uppercase; }
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:10000; overflow-y:auto; backdrop-filter: blur(15px); }
        .modal-content { max-width:450px; margin:50px auto; background: #0d0d1a; padding:30px; border-radius:30px; border: 1px solid rgba(217, 70, 239, 0.3); position:relative; }
        .p-input { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #222; background: #111; color: #fff; box-sizing: border-box; outline: none; }
        .upload-zone { background: rgba(255, 255, 255, 0.03); border: 2px dashed #333; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 15px; }
        #previewGrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .preview-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 8px; border: 1px solid var(--purple); }
        .custom-alert { position: fixed; top: 20px; right: 20px; background: var(--gradient); color: white; padding: 15px 25px; border-radius: 12px; z-index: 20000; display: none; }
    </style>
</head>
<body>

    <div id="alertBox" class="custom-alert"></div>

    <header class="hero-section" data-aos="zoom-in">
        <h1 class="hero-title">Active Contests</h1>
        <div style="width: 100px; height: 4px; background: var(--gradient); margin: 10px auto; border-radius: 10px;"></div>
    </header>

    <div class="contest-grid">
        <div class="contest-card" data-aos="fade-up">
            <div class="live-tag">LIVE</div>
            <div class="icon-box">📸</div>
            <h3>Photo Shoot</h3>
            <p style="color:#888; font-size: 0.9rem;">Upload 5 photos and win ₹500.</p>
            <button id="photoBtn" class="btn-join">Checking...</button>
        </div>
        <div class="contest-card" data-aos="fade-up" style="opacity:0.5;"><div class="icon-box">💻</div><h3>Web Build</h3><button class="btn-join" style="background:#222; cursor:not-allowed;">Soon</button></div>
    </div>

    <div id="contestModal" class="modal-overlay">
        <div class="modal-content">
            <span onclick="closeModal()" style="position:absolute; top:15px; right:20px; cursor:pointer; font-size:25px;">&times;</span>
            <div id="regForm">
                <h2 style="text-align:center; color:var(--accent);">Join Contest</h2>
                <input type="text" id="name" placeholder="Name" class="p-input">
                <input type="email" id="email" placeholder="Email" class="p-input">
                <input type="tel" id="mobile" placeholder="Mobile" class="p-input">
                <input type="text" id="college" placeholder="College/School" class="p-input">
                <input type="text" id="address" placeholder="City" class="p-input">
                <div class="upload-zone">
                    <input type="file" id="fileInp" accept="image/*" onchange="compressPhoto(this)" style="display:none;">
                    <button type="button" onclick="document.getElementById('fileInp').click()" style="background:#222; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;">+ Add Photo</button>
                    <div id="previewGrid"></div>
                </div>
                <button id="payBtn" onclick="startPay()" class="btn-join">Pay ₹19 & Join</button>
            </div>
        </div>
    </div>

    <div id="resModal" class="modal-overlay">
        <div class="modal-content" style="text-align:center;">
            <div style="font-size:3rem;">🏅</div>
            <h2>Entry Received!</h2>
            <p style="color:#888;">Result will be live after 24 hours.</p>
            <button onclick="document.getElementById('resModal').style.display='none'" class="btn-join">Got it</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <script>
        // --- THE ATOMIC RESET (Clears old junk) ---
        const CURRENT_APP_ID = "PROFI_V20_STABLE"; 
        if(localStorage.getItem('app_id') !== CURRENT_APP_ID) {
            localStorage.clear();
            localStorage.setItem('app_id', CURRENT_APP_ID);
        }

        AOS.init();
        const firebaseConfig = {
            apiKey: "AIzaSyD5yA9_Ieu05rC4qYVuokI04MZ5ggLpAms",
            authDomain: "profibharat-system.firebaseapp.com",
            databaseURL: "https://profibharat-system-default-rtdb.firebaseio.com",
            projectId: "profibharat-system"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let photos = [];
        function closeModal() { document.getElementById('contestModal').style.display='none'; }
        function openModal() { document.getElementById('contestModal').style.display='block'; }
        
        // --- FAST COMPRESSION ---
        function compressPhoto(input) {
            if(photos.length >= 5) return alert("Max 5 photos!");
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX = 600;
                    let w = img.width, h = img.height;
                    if(w > MAX) { h *= MAX/w; w = MAX; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    photos.push(canvas.toDataURL('image/jpeg', 0.6));
                    render();
                }
            }
            reader.readAsDataURL(file);
        }

        function render() {
            const g = document.getElementById('previewGrid');
            g.innerHTML = photos.map(p => `<img src="${p}" class="preview-img">`).join('');
        }

        async function startPay() {
            const e = document.getElementById('email').value;
            if(!e || photos.length === 0) return alert("Details bhariye!");

            const opt = {
                "key": "rzp_test_STmxoXXJHqZTnR",
                "amount": "1900",
                "name": "Profi-BHARAT",
                "handler": async function(res) {
                    document.getElementById('payBtn').innerText = "Uploading...";
                    // Use PUSH to keep all data safe
                    await db.ref('contest_entries').push({
                        name: document.getElementById('name').value,
                        email: e,
                        mobile: document.getElementById('mobile').value,
                        photos: photos,
                        payId: res.razorpay_payment_id,
                        time: new Date().toLocaleString()
                    });
                    localStorage.setItem('PB_STATUS', 'PAID');
                    location.reload();
                }
            };
            new Razorpay(opt).open();
        }

        // --- BUTTON STATUS LOGIC ---
        function init() {
            const btn = document.getElementById('photoBtn');
            if(localStorage.getItem('PB_STATUS') === 'PAID') {
                btn.innerText = "See Result";
                btn.style.background = "rgba(255,255,255,0.1)";
                btn.onclick = () => document.getElementById('resModal').style.display='block';
            } else {
                btn.innerText = "Join Contest";
                btn.onclick = openModal;
            }
        }
        init();
    </script>
</body>
</html>
