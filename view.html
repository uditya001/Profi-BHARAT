<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Viewer | Profi-BHARAT</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  background: radial-gradient(circle at top, #14001f, #000);
  color: white;
  overflow: hidden;
}

/* HEADER */
.header {
  padding: 15px 20px;
  background: rgba(0,0,0,0.6);
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid rgba(168,85,247,0.3);
}

.title {
  font-size: 1.1rem;
}

/* IFRAME PDF VIEW */
.pdf-frame {
  width: 100%;
  height: 100vh;
  border: none;
}

/* WATERMARK */
.watermark {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-30deg);
  font-size: 40px;
  opacity: 0.08;
  pointer-events: none;
}

/* CONTROLS (optional remove if not needed) */
.controls {
  position: fixed;
  bottom: 20px;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 10px;
}

.btn {
  padding: 10px 18px;
  border-radius: 20px;
  border: none;
  background: linear-gradient(135deg, #a855f7, #6d28d9);
  color: white;
  cursor: pointer;
}
</style>
</head>

<body oncontextmenu="return false;">

<div class="header">
  <div class="title">Profi-BHARAT Secure Viewer</div>
</div>

<!-- ✅ GOOGLE DRIVE PDF VIEWER -->
<iframe 
  class="pdf-frame"
  src="https://docs.google.com/gview?url=https://drive.google.com/uc?id=1ZSoCjEyhsB5_J4smhxBkTKDnmtG862dy&embedded=true">
</iframe>

<!-- WATERMARK -->
<div class="watermark" id="watermark">Profi-Bharat User</div>

<script>
// ===== BASIC PROTECTION =====
document.addEventListener("keydown", function(e) {
  if (e.ctrlKey && (e.key === 's' || e.key === 'p')) {
    e.preventDefault();
  }
});

// ===== WATERMARK (DYNAMIC READY) =====
const user = "User@profi";
document.getElementById("watermark").innerText = user;
</script>

</body>
</html>
