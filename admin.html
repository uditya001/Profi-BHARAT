<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profi-Admin | Tagda Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg: #05050a; 
            --card-bg: rgba(255, 255, 255, 0.03);
            --accent: #d946ef; 
            --purple: #a855f7;
            --danger: #ef4444;
            --success: #10b981;
            --gradient-90: linear-gradient(135deg, #d946ef 0%, #a855f7 100%);
        }

        body { background: var(--bg); color: white; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 20px; overflow-x: hidden; }

        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.05); padding: 25px; border-radius: 24px; text-align: center; backdrop-filter: blur(10px); transition: 0.3s; }
        .stat-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .stat-card i { font-size: 2rem; color: var(--accent); margin-bottom: 15px; }
        .stat-card h3 { margin: 0; font-size: 14px; color: #888; text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0; font-size: 28px; font-weight: 800; background: var(--gradient-90); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Main Container & Table */
        .main-container { background: var(--card-bg); border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.05); padding: 30px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        
        .btn { padding: 12px 24px; border-radius: 12px; border: none; cursor: pointer; font-weight: 700; display: flex; align-items: center; gap: 8px; transition: 0.3s; font-size: 14px; }
        .btn-excel { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; padding: 10px; border-radius: 8px; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }

        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { text-align: left; padding: 20px; color: var(--accent); font-size: 12px; text-transform: uppercase; border-bottom: 2px solid #111; letter-spacing: 1px; }
        td { padding: 18px 20px; border-bottom: 1px solid #111; font-size: 14px; color: #ccc; vertical-align: middle; }
        tr:hover td { background: rgba(255,255,255,0.01); }

        /* Photo Stack */
        .photo-stack { display: flex; gap: 8px; }
        .user-img { 
            width: 55px; height: 55px; 
            border-radius: 12px; 
            object-fit: cover; 
            border: 2px solid #1a1a1a;
            cursor: pointer;
            transition: 0.3s ease;
        }
        .user-img:hover { transform: scale(1.1); border-color: var(--accent); box-shadow: 0 5px 15px rgba(217, 70, 239, 0.3); }

        .payment-id { font-family: monospace; color: var(--success); background: rgba(16, 185, 129, 0.1); padding: 4px 8px; border-radius: 6px; font-size: 12px; }

        /* --- 🚀 ULTRA CRAZY TEAM SECTION STYLES --- */
        .crazy-team-wrapper { margin: 80px 0 20px; padding: 20px; text-align: center; }
        .team-title { font-size: 2.8rem; font-weight: 800; background: var(--gradient-90); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 50px; }
        .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; perspective: 1000px; }
        
        .crazy-card { 
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 40px; 
            padding: 50px 20px; 
            transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1); 
            cursor: pointer; 
            position: relative; 
            overflow: hidden;
            backdrop-filter: blur(10px);
            transform-style: preserve-3d;
        }
        
        .crazy-card:hover { 
            transform: translateY(-20px) rotateX(10deg) rotateY(-5deg); 
            border-color: var(--accent); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 30px rgba(217, 70, 239, 0.2); 
        }

        .img-circle { 
            width: 140px; height: 140px; 
            margin: 0 auto 25px; 
            border-radius: 50%; 
            border: 4px solid var(--purple); 
            position: relative; 
            z-index: 2; 
            overflow: hidden; 
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
            transition: 0.5s;
            animation: pulse-border 3s infinite;
        }
        @keyframes pulse-border {
            0%, 100% { border-color: var(--purple); box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); }
            50% { border-color: var(--accent); box-shadow: 0 0 30px rgba(217, 70, 239, 0.7); }
        }

        .img-circle img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .crazy-card:hover img { transform: scale(1.1); }

        .member-name { font-size: 1.6rem; font-weight: 800; color: #fff; letter-spacing: 1px; text-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .neon-glow { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 0%, rgba(217, 70, 239, 0.15), transparent 70%); opacity: 0; transition: 0.5s; }
        .crazy-card:hover .neon-glow { opacity: 1; }

        /* --- THE NEW LINE STYLE --- */
        .aware-line {
            text-align: center;
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: 5px;
            color: #444;
            text-transform: uppercase;
            margin-top: 40px;
            padding-bottom: 50px;
            transition: 0.5s;
        }
        .aware-line:hover {
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent);
        }

        /* Fullscreen Lightbox */
        .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 10000; justify-content: center; align-items: center; backdrop-filter: blur(10px); opacity: 0; transition: opacity 0.3s ease; }
        .lightbox.active { display: flex; opacity: 1; }
        .lightbox-content { position: relative; max-width: 90%; max-height: 90%; text-align: center; }
        .lightbox-img { max-width: 100%; max-height: 80vh; border-radius: 15px; border: 2px solid rgba(255,255,255,0.1); transition: transform 0.3s ease; }
        .close-lightbox { position: absolute; top: -40px; right: 0; color: #888; font-size: 30px; cursor: pointer; }
    </style>
</head>
<body>

    <h1 style="text-align:center; margin-bottom:40px; font-weight:800; font-size:2.8rem;">PROFI-BHARAT <span style="color:var(--accent)">ADMIN</span></h1>

    <div class="stats-grid">
        <div class="stat-card"><i class="fas fa-users"></i><h3>Contestants</h3><p id="totalUsers">0</p></div>
        <div class="stat-card"><i class="fas fa-indian-rupee-sign"></i><h3>Revenue</h3><p id="totalRevenue">₹0</p></div>
        <div class="stat-card"><i class="fas fa-camera"></i><h3>Total Photos</h3><p id="totalPhotos">0</p></div>
    </div>

    <div class="main-container">
        <div class="header-flex">
            <h2 style="margin:0; font-weight:700;">Recent Registrations</h2>
            <button class="btn btn-excel" onclick="exportToExcel()"><i class="fas fa-file-excel"></i> Export Excel</button>
        </div>
        <div style="overflow-x:auto;">
            <table id="adminTable">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Name</th>
                        <th>College & City</th>
                        <th>Contact</th>
                        <th>Photos (Click to Zoom)</th>
                        <th>Payment ID</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="crazy-team-wrapper">
        <h2 class="team-title">System Architects</h2>
        <div class="team-grid">
            <div class="crazy-card" onclick="document.getElementById('f-uditya').click()">
                <div class="neon-glow"></div>
                <div class="img-circle"><img id="v-uditya" src=""></div>
                <input type="file" id="f-uditya" hidden onchange="upImg(this, 'v-uditya', 'Uditya')">
                <div class="member-name">Uditya Raj</div>
            </div>

            <div class="crazy-card" onclick="document.getElementById('f-dil').click()">
                <div class="neon-glow"></div>
                <div class="img-circle"><img id="v-dil" src=""></div>
                <input type="file" id="f-dil" hidden onchange="upImg(this, 'v-dil', 'Dilkhush')">
                <div class="member-name">Dilkhush Sharma</div>
            </div>

            <div class="crazy-card" onclick="document.getElementById('f-pri').click()">
                <div class="neon-glow"></div>
                <div class="img-circle"><img id="v-pri" src=""></div>
                <input type="file" id="f-pri" hidden onchange="upImg(this, 'v-pri', 'Prince')">
                <div class="member-name">Prince Kumar</div>
            </div>

            <div class="crazy-card" onclick="document.getElementById('f-ayu').click()">
                <div class="neon-glow"></div>
                <div class="img-circle"><img id="v-ayu" src=""></div>
                <input type="file" id="f-ayu" hidden onchange="upImg(this, 'v-ayu', 'Ayush')">
                <div class="member-name">Ayush Kumar</div>
            </div>
        </div>

        <div class="aware-line">THE SYSTEM DOESN'T RUN US, WE RUN THE SYSTEM</div>
    </div>

    <div id="lightbox" class="lightbox">
        <div class="lightbox-content">
            <span class="close-lightbox" onclick="closeLightbox()">&times;</span>
            <img id="lightboxImg" src="" class="lightbox-img">
            <div class="lightbox-controls">
                <a id="downloadBtn" href="" download class="btn btn-download"><i class="fas fa-download"></i> Save Photo</a>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD5yA9_Ieu05rC4qYVuokI04MZ5ggLpAms",
            authDomain: "profibharat-system.firebaseapp.com",
            databaseURL: "https://profibharat-system-default-rtdb.firebaseio.com",
            projectId: "profibharat-system"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Load Registrations
        db.ref('contest_entries').on('value', (snap) => {
            const data = snap.val();
            const body = document.getElementById('tableBody');
            body.innerHTML = "";
            let uCount = 0, pCount = 0;
            if(data) {
                Object.keys(data).forEach(k => {
                    const v = data[k]; uCount++; pCount += v.photos ? v.photos.length : 0;
                    body.innerHTML += `<tr><td>${v.timestamp||''}</td><td><b style='color:white'>${v.name}</b></td><td>${v.college}<br><small>${v.address}</small></td><td>${v.email}</td><td><div class='photo-stack'>${v.photos?v.photos.map(p=>`<img src="${p}" class="user-img" onclick="openLightbox('${p}')">`).join(''):''}</div></td><td><span class='payment-id'>${v.paymentId}</span></td><td><button class='btn-danger btn' onclick="del('${k}')"><i class='fas fa-trash'></i></button></td></tr>`;
                });
            }
            document.getElementById('totalUsers').innerText = uCount;
            document.getElementById('totalRevenue').innerText = "₹" + (uCount * 19);
            document.getElementById('totalPhotos').innerText = pCount;
        });

        const DEFAULT_ICON = "https://cdn-icons-png.flaticon.com/512/149/149071.png";

        function upImg(input, imgId, name) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const b64 = e.target.result;
                document.getElementById(imgId).src = b64;
                db.ref('team_pics/' + name).set(b64);
                alert(name + " ki photo update ho gayi! 🔥");
            };
            reader.readAsDataURL(input.files[0]);
        }
        
        db.ref('team_pics').on('value', snap => {
            const d = snap.val();
            document.getElementById('v-uditya').src = (d && d.Uditya) ? d.Uditya : DEFAULT_ICON;
            document.getElementById('v-dil').src = (d && d.Dilkhush) ? d.Dilkhush : DEFAULT_ICON;
            document.getElementById('v-pri').src = (d && d.Prince) ? d.Prince : DEFAULT_ICON;
            document.getElementById('v-ayu').src = (d && d.Ayush) ? d.Ayush : DEFAULT_ICON;
        });

        function openLightbox(s) { document.getElementById('lightboxImg').src = s; document.getElementById('downloadBtn').href = s; document.getElementById('lightbox').classList.add('active'); }
        function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); }
        function del(id) { if(confirm("Delete?")) db.ref('contest_entries/' + id).remove(); }
        function exportToExcel() { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById("adminTable")), "ProfiBharat.xlsx"); }
    </script>
</body>
</html>
